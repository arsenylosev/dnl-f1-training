# =============================================================================
# Vertex AI Custom Training Job — Foundation-1 DiT Fine-Tuning (3s samples)
# =============================================================================
#
# Prerequisites:
#   1. Pre-encoding complete: gs://YOUR_BUCKET/pre_encoded_3s/ must exist.
#      Run vertex_job_pre_encode.yaml first.
#   2. Base checkpoint in GCS: gs://YOUR_BUCKET/checkpoints/stable-audio-open-1.0.ckpt
#   3. CLAP checkpoint in GCS: gs://YOUR_BUCKET/checkpoints/clap.ckpt
#      (e.g., music_audioset_epoch_15_esc_90.14.pt renamed to clap.ckpt)
#
#   Option A (recommended — ~5 min startup):
#     Build and push your Docker image (Cloud Build, same image as pre-encode):
#       gcloud builds submit \
#         --tag europe-west4-docker.pkg.dev/PROJECT_ID/dnl-training/f1-trainer:latest \
#         --machine-type e2-highcpu-32 --timeout 3600 --async .
#     Set imageUri below to that URI (this repo standardizes on image name f1-trainer).
#
#   Option B (no Docker build — ~15 min startup):
#     Use the commented-out DLVM imageUri. The inline bootstrap block
#     installs all missing system packages and Python deps at job start.
#
# Quota check:
#   gcloud compute regions describe europe-west4 --project=YOUR_PROJECT_ID \
#     | grep -A2 'NVIDIA_H100'
#   Request at: console.cloud.google.com/iam-admin/quotas
#   Filter: NVIDIA_H100_80GB_GPUS, region: europe-west4, request value: 2
#
# Submit:
#   gcloud ai custom-jobs create \
#     --region=europe-west4 \
#     --display-name=foundation1-finetune-3s \
#     --config=scripts/vertex_job_f1_3s.yaml
#
# Monitor:
#   gcloud ai custom-jobs list --region=europe-west4
#   gcloud ai custom-jobs stream-logs JOB_ID --region=europe-west4
#
# Secrets (HUGGINGFACE_TOKEN, ClearML, etc.):
#   Prefer a private copy of this YAML with env values set, or patch the env block
#   right before submit — do not commit tokens. Same pattern for training as pre-encode.
# =============================================================================

workerPoolSpecs:
  - machineSpec:
      # a3-highgpu-2g: 2× H100 80GB, 52 vCPU, 234 GB RAM, 200 Gbps NIC
      machineType: a3-highgpu-2g
      acceleratorType: NVIDIA_H100_80GB
      acceleratorCount: 2

    replicaCount: 1

    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 500

    containerSpec:
      # ── Option A: Pre-built image (recommended) — must match f1-trainer in Artifact Registry
      imageUri: "europe-west4-docker.pkg.dev/winter-quanta-457022-s0/dnl-training/f1-trainer:latest"

      # ── Option B: Public DLVM base image (uncomment + comment out Option A) ─
      # imageUri: "us-docker.pkg.dev/deeplearning-platform-release/gcr.io/pytorch-gpu.2-1.py310:latest"

      command:
        - bash
        - -c
        - |
          set -euo pipefail

          # ── [0/7] System packages — OPTION B ONLY ─────────────────────────
          # Uncomment this entire block if using Option B (DLVM base image).
          # Skip if using Option A (pre-built image already has all packages).
          #
          # echo "=== [0/7] Installing system packages ==="
          # apt-get update -qq
          # apt-get install -y --no-install-recommends \
          #     git git-lfs curl wget gnupg lsb-release software-properties-common \
          #     build-essential libsndfile1 libsndfile1-dev libsox-fmt-all sox ffmpeg \
          #     libavcodec-dev libavformat-dev libavutil-dev libswresample-dev \
          #     libportaudio2 libasound2-dev libflac-dev libvorbis-dev libopus-dev \
          #     libmp3lame-dev fuse jq rsync pv
          # rm -rf /var/lib/apt/lists/*
          # curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
          #     | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          # echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/cloud.google.gpg] \
          #     https://packages.cloud.google.com/apt cloud-sdk main" \
          #     | tee /etc/apt/sources.list.d/google-cloud-sdk.list
          # echo "deb https://packages.cloud.google.com/apt gcsfuse-$(lsb_release -cs) main" \
          #     | tee /etc/apt/sources.list.d/gcsfuse.list
          # apt-get update -qq && apt-get install -y google-cloud-cli gcsfuse
          # echo "user_allow_other" >> /etc/fuse.conf

          # ── [1/7] Python packages — OPTION B ONLY ─────────────────────────
          # Uncomment if using Option B:
          # pip install --upgrade pip setuptools wheel --quiet
          # pip install --no-cache-dir -r /workspace/requirements/base.txt --quiet
          # pip install --no-cache-dir -r /workspace/requirements/train.txt --quiet
          # pip install --no-cache-dir -e /workspace/ --no-deps --quiet

          echo "=== [2/7] Verifying environment ==="
          # stable_audio_tools is in site-packages from the image build — see Dockerfile.
          # Avoid `pip install /workspace/` here (needs setup.py/pyproject.toml under /workspace).
          python3 -c "import torch, torchaudio, soundfile, pytorch_lightning as pl; \
            import stable_audio_tools; \
            print('PyTorch ' + torch.__version__ + ' | PL ' + pl.__version__); \
            print('stable_audio_tools: OK'); \
            print('CUDA: ' + str(torch.cuda.is_available()) + ' | GPUs: ' + str(torch.cuda.device_count())); \
            [print('  GPU ' + str(i) + ': ' + torch.cuda.get_device_properties(i).name + \
              ' (' + str(torch.cuda.get_device_properties(i).total_memory // 1024**3) + ' GB)') \
              for i in range(torch.cuda.device_count())];"

          echo "=== [3/7] Syncing pre-encoded latents from GCS ==="
          # NOTE: gcsfuse requires /dev/fuse + CAP_SYS_ADMIN, which Vertex AI
          # unprivileged containers do NOT have (fusermount exits 1 immediately).
          # We copy the pre-encoded dataset to local SSD once at startup.
          # The 500 GB boot disk has ample space for the latent files.
          mkdir -p /workspace/pre_encoded_3s
          echo "Syncing gs://${GCS_BUCKET}/pre_encoded_3s/ → /workspace/pre_encoded_3s/ ..."
          gsutil -m rsync -r \
            "gs://${GCS_BUCKET}/pre_encoded_3s/" \
            /workspace/pre_encoded_3s/
          echo "Sync complete. Latent files:"
          find /workspace/pre_encoded_3s -name '*.npy' | wc -l

          echo "=== [4/7] Locating base checkpoint ==="
          CKPT_LOCAL="/workspace/stable-audio-open-1.0.ckpt"
          CKPT_GCS="gs://${GCS_BUCKET}/checkpoints/stable-audio-open-1.0.ckpt"

          if [ -f "$CKPT_LOCAL" ]; then
            echo "Checkpoint already present at ${CKPT_LOCAL}"
          elif gsutil -q stat "${CKPT_GCS}" 2>/dev/null; then
            echo "Downloading checkpoint from GCS..."
            gsutil -m cp "${CKPT_GCS}" "${CKPT_LOCAL}"
          else
            echo "Checkpoint not in GCS. Downloading from HuggingFace Hub..."
            python3 -c "from huggingface_hub import hf_hub_download; import os; \
              path = hf_hub_download(repo_id='stabilityai/stable-audio-open-1.0', \
                filename='model.safetensors', local_dir='/workspace'); \
              os.rename(path, '${CKPT_LOCAL}'); \
              print('Downloaded to ${CKPT_LOCAL}')"
          fi

          echo "=== [4b/7] Locating CLAP checkpoint ==="
          CLAP_LOCAL="/workspace/clap.ckpt"
          CLAP_GCS="gs://${GCS_BUCKET}/checkpoints/clap.ckpt"

          if [ -f "${CLAP_LOCAL}" ]; then
            echo "CLAP checkpoint already present at ${CLAP_LOCAL}"
          elif gsutil -q stat "${CLAP_GCS}" 2>/dev/null; then
            echo "Downloading CLAP checkpoint from GCS..."
            gsutil -m cp "${CLAP_GCS}" "${CLAP_LOCAL}"
            echo "CLAP checkpoint downloaded: ${CLAP_LOCAL}"
          else
            echo "ERROR: CLAP checkpoint not found at ${CLAP_GCS}" >&2
            echo "Upload a CLAP checkpoint and ensure CLAP_CKPT_GCS is set correctly." >&2
            echo "Example: gsutil cp music_audioset_epoch_15_esc_90.14.pt gs://\${GCS_BUCKET}/checkpoints/clap.ckpt" >&2
            exit 1
          fi

          echo "=== [4c/7] Patching model config with CLAP path ==="
          MODEL_CONFIG_PATCHED="/tmp/model_config_3s_runtime.json"
          python3 -c "import json; from pathlib import Path; \
            src = Path('models/foundation1_3s/model_config_3s.json'); \
            cfg = json.loads(src.read_text()); \
            [c.setdefault('config', {}).update({'clap_ckpt_path': '${CLAP_LOCAL}'}) \
              for c in cfg.get('model', {}).get('conditioning', {}).get('configs', []) \
              if c.get('type') == 'clap_text']; \
            Path('${MODEL_CONFIG_PATCHED}').write_text(json.dumps(cfg)); \
            print('Runtime model config written to ${MODEL_CONFIG_PATCHED}')"

          echo "=== [5/7] Checking for resume checkpoint ==="
          RESUME_FLAG=""
          LATEST_CKPT=$(gsutil ls "gs://${GCS_BUCKET}/checkpoints/f1_3s/*.ckpt" 2>/dev/null \
            | sort | tail -1 || true)
          if [ -n "$LATEST_CKPT" ]; then
            echo "Resuming from: $LATEST_CKPT"
            RESUME_LOCAL="/workspace/resume.ckpt"
            gsutil -m cp "$LATEST_CKPT" "$RESUME_LOCAL"
            RESUME_FLAG="--checkpoint-path ${RESUME_LOCAL}"
          else
            echo "No resume checkpoint found. Starting from base checkpoint."
          fi

          echo "=== [6/7] Starting DiT fine-tuning ==="
          cd /workspace
          if [[ ! -f models/foundation1_3s/model_config_3s.json ]]; then
            echo "FATAL: missing models/foundation1_3s/model_config_3s.json — rebuild f1-trainer (see ci/Dockerfile.context-verify)." >&2
            exit 1
          fi
          if [[ ! -f "${MODEL_CONFIG_PATCHED}" ]]; then
            echo "FATAL: missing ${MODEL_CONFIG_PATCHED} — CLAP patching failed." >&2
            exit 1
          fi
          DS_PRE="stable_audio_tools/configs/dataset_configs/pre_encoded_f1_3s.json"
          if [[ ! -f "$DS_PRE" ]]; then
            echo "FATAL: missing ${DS_PRE} — rebuild f1-trainer." >&2
            exit 1
          fi
          torchrun \
            --nproc_per_node="${NUM_GPUS}" \
            --nnodes=1 \
            --node_rank=0 \
            train.py \
            --model-config "${MODEL_CONFIG_PATCHED}" \
            --pretrained-ckpt-path "${CKPT_LOCAL}" \
            --dataset-config "${DS_PRE}" \
            --save-dir /workspace/checkpoints/f1_3s/ \
            --name foundation1-3s-finetune \
            --num-nodes 1 \
            --batch-size "${BATCH_SIZE}" \
            --num-workers "${NUM_WORKERS}" \
            --precision "${PRECISION}" \
            --use-ema \
            --ema-decay 0.999 \
            --demo-every 5000 \
            --checkpoint-every 10000 \
            ${RESUME_FLAG}

          echo "=== [7/7] Uploading checkpoints to GCS ==="
          gsutil -m rsync -r \
            /workspace/checkpoints/f1_3s/ \
            "gs://${GCS_BUCKET}/checkpoints/f1_3s/"
          echo "Training complete. Checkpoints at: gs://${GCS_BUCKET}/checkpoints/f1_3s/"

      env:
        # ── Required ──────────────────────────────────────────────────────────
        - name: GCS_BUCKET
          value: "YOUR_GCS_BUCKET_NAME"          # e.g. dnl-audio-training

        # ── Training hyperparameters ──────────────────────────────────────────
        - name: NUM_GPUS
          value: "2"                             # Must match acceleratorCount above
        - name: BATCH_SIZE
          value: "16"                            # Per-GPU; effective batch = 16×2 = 32
        - name: NUM_WORKERS
          value: "8"                             # 52 vCPUs available; leave headroom
        - name: PRECISION
          value: "16-mixed"                      # bf16-mixed also supported on H100

        # ── HuggingFace (required only if checkpoint is NOT already in GCS) ─────
        # stable-audio-open-1.0 is a gated model. To use the HF fallback:
        #   1. Accept license: https://huggingface.co/stabilityai/stable-audio-open-1.0
        #   2. Create read token: https://huggingface.co/settings/tokens
        #   3. Set the value below.
        # Leave empty ("") if the checkpoint is already in GCS (recommended).
        # - name: HUGGINGFACE_TOKEN
        #   value: ""                               # YOUR_HF_READ_TOKEN or leave empty

        # ── ClearML experiment tracking (optional) ────────────────────────────
        - name: CLEARML_API_HOST
          value: "https://api.clear.ml"
        - name: CLEARML_API_ACCESS_KEY
          value: "YOUR_CLEARML_ACCESS_KEY"
        - name: CLEARML_API_SECRET_KEY
          value: "YOUR_CLEARML_SECRET_KEY"
        - name: CLEARML_PROJECT
          value: "AI Synthesizer"
        - name: CLEARML_TASK_NAME
          value: "Foundation-1 Finetune (initial train)"

        # ── W&B tracking (optional) ───────────────────────────────────────────
        - name: WANDB_API_KEY
          value: "YOUR_WANDB_API_KEY"
        - name: WANDB_PROJECT
          value: "AI-Synthesizer"

    # ── Spot VM (optional — ~65% cost reduction) ──────────────────────────────
    # Vertex AI auto-retries up to 6 times on preemption.
    # Training resumes from latest checkpoint (see [5/7] above).
    # Uncomment to enable:
    # scheduling:
    #   nodePoolSovereign: SPOT

# =============================================================================
# Cost estimate (europe-west4, April 2026):
#   a3-highgpu-2g on-demand: ~$23.94/hr (incl. Vertex AI management fee)
#   a3-highgpu-2g spot:       ~$8.37/hr (incl. Vertex AI management fee)
#
#   Minimal viable run (~72h): $1,724 on-demand | $603 spot
#   Multi-family run (~360h):  $8,618 on-demand | $3,013 spot
# =============================================================================
