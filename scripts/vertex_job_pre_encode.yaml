# =============================================================================
# Vertex AI Custom Training Job — Foundation-1 VAE Pre-Encoding
# =============================================================================
#
# This job runs pre_encode.py on a single A100 40GB GPU to encode all WAV
# files in your GCS bucket through the frozen OOBLECK VAE, producing 64-token
# latent tensors for 3-second audio. Output is written back to GCS.
#
# Prerequisites:
#   Build and push your Docker image first (see Dockerfile):
#     gcloud auth configure-docker europe-west4-docker.pkg.dev
#     gcloud builds submit \
#       --tag europe-west4-docker.pkg.dev/YOUR_PROJECT_ID/dnl-training/f1-trainer:latest \
#       --machine-type e2-highcpu-32 --timeout 3600 .
#   Then replace all YOUR_* placeholders below.
#
# Quota check (before submitting):
#   gcloud compute regions describe europe-west4 --project=YOUR_PROJECT_ID \
#     | grep -A2 'NVIDIA_A100'
#   Request quota at: console.cloud.google.com/iam-admin/quotas
#   Filter: NVIDIA_A100_GPUS, region: europe-west4, request value: 1
#
# Submit with:
#   gcloud ai custom-jobs create \
#     --region=europe-west4 \
#     --display-name=dnl-f1-pre-encode-$(date +%Y%m%d) \
#     --config=scripts/vertex_job_pre_encode.yaml
#
# Monitor / find logs:
#   1. List jobs and get JOB_ID:
#        gcloud ai custom-jobs list --region=europe-west4
#   2. Describe job state + error message:
#        gcloud ai custom-jobs describe JOB_ID --region=europe-west4
#   3. Stream live logs (most useful for debugging):
#        gcloud ai custom-jobs stream-logs JOB_ID --region=europe-west4
#   4. Cloud Logging (full historical logs):
#        gcloud logging read \
#          'resource.type="aiplatform.googleapis.com/CustomJob" AND
#           resource.labels.job_id="JOB_ID"' \
#          --project=YOUR_PROJECT_ID --limit=200 --format=json
#   5. Console UI:
#        https://console.cloud.google.com/vertex-ai/training/custom-jobs
#        Click the job → "View logs" button → Cloud Logging
#
# Source: https://cloud.google.com/vertex-ai/docs/training/create-custom-job
# =============================================================================

# FIX 1: The config file must contain a CustomJobSpec, not a bare
# workerPoolSpecs list.  When using --config, gcloud expects the top-level
# key to be 'workerPoolSpecs' (camelCase) as part of the CustomJobSpec JSON
# representation.  This is correct — no wrapper key is needed.
# Reference: https://cloud.google.com/vertex-ai/docs/reference/rest/v1/CustomJobSpec

workerPoolSpecs:
  - machineSpec:
      # a2-highgpu-1g: 1× A100 40GB, 12 vCPU, 85 GB RAM
      machineType: a2-highgpu-1g

      # FIX 2: The correct AcceleratorType enum value for A100 40GB is
      # NVIDIA_TESLA_A100 (not NVIDIA_A100).  For A100 80GB use
      # NVIDIA_A100_80GB.  For a2-highgpu-* machine types the accelerator
      # is implicit in the machine type, so this field can be omitted
      # entirely — but specifying it explicitly is valid and makes the
      # intent clear.
      acceleratorType: NVIDIA_TESLA_A100
      acceleratorCount: 1

    replicaCount: 1

    diskSpec:
      bootDiskType: pd-ssd
      # 500 GB: model weights (~5 GB) + gcsfuse cache + OS overhead
      bootDiskSizeGb: 500

    containerSpec:
      imageUri: "europe-west4-docker.pkg.dev/YOUR_PROJECT_ID/dnl-training/f1-trainer:latest"

      # Entry point: mount GCS, locate checkpoint, run pre_encode.py
      # FIX 3: The inline 'python -c "..." ' blocks had multi-line Python
      # source indented inside a YAML block scalar.  The shell receives the
      # indentation literally, which causes IndentationError for the
      # 'if torch.cuda.is_available():' block.  All Python statements are
      # now written as single-line semicolon-joined strings so the shell
      # never sees unexpected indentation.
      command:
        - bash
        - -c
        - |
          set -euo pipefail

          echo "=== [1/5] Verifying environment ==="
          python3 -c "import torch, torchaudio, soundfile, librosa, pytorch_lightning as pl; \
            print('PyTorch ' + torch.__version__ + ' | torchaudio ' + torchaudio.__version__ + ' | PL ' + pl.__version__); \
            print('CUDA available: ' + str(torch.cuda.is_available()) + ' | GPUs: ' + str(torch.cuda.device_count())); \
            print('GPU: ' + (torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'none'))"

          echo "=== [2/5] Mounting GCS bucket ==="
          mkdir -p /mnt/gcs /tmp/gcsfuse-cache
          # gcsfuse 2.0+ replaced CLI flags with a config file.
          # --file-cache-capacity-mb never existed as a CLI flag (unknown flag error).
          # --stat-cache-ttl / --type-cache-ttl are deprecated; use metadata-cache.ttl-secs.
          cat > /tmp/gcsfuse-config.yaml << 'GCSFUSE_CFG'
          file-cache:
            max-size-mb: 4096
            cache-file-for-range-read: true
          cache-dir: /tmp/gcsfuse-cache
          metadata-cache:
            ttl-secs: 60
            stat-cache-max-size-mb: 32
          GCSFUSE_CFG
          gcsfuse --implicit-dirs \
            --config-file /tmp/gcsfuse-config.yaml \
            "${GCS_BUCKET}" /mnt/gcs
          echo "GCS bucket mounted at /mnt/gcs"

          echo "=== [3/5] Locating base checkpoint ==="
          CKPT_LOCAL="/workspace/stable-audio-open-1.0.ckpt"
          CKPT_GCS="gs://${GCS_BUCKET}/checkpoints/stable-audio-open-1.0.ckpt"

          if [ -f "$CKPT_LOCAL" ]; then
            echo "Checkpoint already present at ${CKPT_LOCAL}"
          elif gsutil -q stat "${CKPT_GCS}" 2>/dev/null; then
            echo "Downloading checkpoint from GCS..."
            gsutil -m cp "${CKPT_GCS}" "${CKPT_LOCAL}"
          else
            echo "Checkpoint not in GCS. Downloading from HuggingFace Hub..."
            python3 -c "from huggingface_hub import hf_hub_download; import os; \
              path = hf_hub_download(repo_id='stabilityai/stable-audio-open-1.0', filename='model.safetensors', local_dir='/workspace'); \
              os.rename(path, '${CKPT_LOCAL}'); \
              print('Downloaded to ${CKPT_LOCAL}')"
          fi

          echo "=== [4/5] Running VAE pre-encoding ==="
          cd /workspace
          python3 pre_encode.py \
            --model-config models/foundation1_3s/model_config_3s.json \
            --ckpt-path "${CKPT_LOCAL}" \
            --dataset-config stable_audio_tools/configs/dataset_configs/gcs_f1_3s_pre_encode.json \
            --output-path /mnt/gcs/pre_encoded_3s/ \
            --sample-size "${SAMPLE_SIZE}" \
            --batch-size "${BATCH_SIZE}" \
            --num-workers "${NUM_WORKERS}" \
            --num-nodes 1

          echo "=== [5/5] Pre-encoding complete ==="
          echo "Output location: gs://${GCS_BUCKET}/pre_encoded_3s/"
          gsutil du -sh "gs://${GCS_BUCKET}/pre_encoded_3s/" || true

      # FIX 4: The 'env' list must be a direct child of 'containerSpec', not
      # a sibling of 'containerSpec'.  In the previous version the indentation
      # placed 'env' at the workerPoolSpec level, which is not a valid field
      # there.  Moved it inside containerSpec where the API expects it.
      env:
        # ── Required ──────────────────────────────────────────────────────────
        - name: GCS_BUCKET
          value: "YOUR_GCS_BUCKET_NAME"          # e.g. dnl-audio-training

        # ── Pre-encoding hyperparameters ──────────────────────────────────────
        - name: SAMPLE_SIZE
          value: "132300"                         # 44100 Hz × 3 s = 132,300 samples
        - name: BATCH_SIZE
          value: "32"                             # Safe for A100 40GB at 3s / 64 tokens
        - name: NUM_WORKERS
          value: "8"                              # 12 vCPUs available; leave 4 for OS

        # ── ClearML experiment tracking (optional) ────────────────────────────
        # Leave empty string to disable. Best practice: inject from Secret Manager.
        - name: CLEARML_API_HOST
          value: "https://api.clear.ml"
        - name: CLEARML_API_ACCESS_KEY
          value: "YOUR_CLEARML_ACCESS_KEY"
        - name: CLEARML_API_SECRET_KEY
          value: "YOUR_CLEARML_SECRET_KEY"
        - name: CLEARML_PROJECT
          value: "Foundation-1 / DNL"
        - name: CLEARML_TASK_NAME
          value: "pre-encode-3s"

# =============================================================================
# Cost estimate (europe-west4, April 2026):
#   a2-highgpu-1g on-demand: $3.67/hr (GCE) + ~20.5% Vertex AI fee = ~$4.42/hr
#   Expected duration:       ~32 hours (3.78M files, batch_size=32)
#   Total on-demand cost:    ~$141
#   Spot discount (~65%):    ~$49
#
# Note: a2-highgpu-1g supports standard (non-Spot) provisioning.
# Standard is recommended for this step — 32h unattended, no auto-resume.
